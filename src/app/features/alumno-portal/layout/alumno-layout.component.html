<!-- Layout PWA móvil — diseño vertical, minimalista -->
<div class="min-h-screen bg-stone-100 flex flex-col max-w-md mx-auto relative">

  <!-- Header -->
  <header class="bg-stone-900 text-white px-6 py-4 flex justify-between items-center">
    <h1 class="text-lg font-black italic uppercase tracking-tight">
      MOVIMENT <span class="text-oliva">VIVER</span>
    </h1>
    <button
      (click)="sidebarOpen.set(true)"
      class="w-10 h-10 rounded-full bg-stone-800 flex items-center justify-center hover:bg-stone-700 transition-colors"
    >
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </header>

  <!-- Sidebar overlay -->
  @if (sidebarOpen()) {
    <div class="fixed inset-0 bg-stone-900/60 z-40" (click)="sidebarOpen.set(false)"></div>
  }

  <!-- Sidebar -->
  <aside class="fixed top-0 right-0 h-full w-72 bg-stone-900 text-white z-50 flex flex-col
                transition-transform duration-300"
    [class.translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <!-- Avatar -->
    <div class="p-8 border-b border-stone-800 flex flex-col items-center gap-3">
      <div class="w-20 h-20 bg-oliva rounded-full flex items-center justify-center text-3xl font-black">
        {{ auth.usuario()?.nombre?.charAt(0) }}
      </div>
      <div class="text-center">
        <p class="font-black text-lg uppercase">{{ auth.usuario()?.nombre }}</p>
        <p class="text-stone-400 text-xs font-bold tracking-widest uppercase">
          {{ auth.usuario()?.grupo ?? 'Alumno' }}
        </p>
      </div>
    </div>

    <!-- Stats motivación -->
    <div class="p-8 flex-1">
      <p class="section-label text-stone-500 mb-4">Tu progreso</p>
      <div class="bg-stone-800 rounded-3xl p-6 text-center">
        <p class="text-oliva text-4xl font-black">{{ asistenciasSvc.estadisticas().asistenciasEsteMes }}</p>
        <p class="text-stone-400 text-xs font-bold uppercase tracking-widest mt-1">días entrenados este mes</p>
        <p class="text-stone-300 text-sm font-bold mt-3">¡Sigue así! 💪</p>
      </div>
    </div>

    <!-- Logout -->
    <div class="p-6 border-t border-stone-800">
      <button
        (click)="logout()"
        class="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-2xl
               text-stone-400 hover:text-red-400 hover:bg-stone-800 transition-all font-bold text-sm uppercase tracking-wide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Page content -->
  <main class="flex-1 flex flex-col">
    <router-outlet />
  </main>

</div>
