<div class="min-h-screen bg-stone-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md bg-white rounded-5xl shadow-2xl border border-stone-200 overflow-hidden relative">

    <!-- Progress / Welcome -->
    <div class="bg-gradient-to-b from-stone-900 to-stone-800 px-8 py-8 text-center relative overflow-hidden">
      <!-- Glow -->
      <div class="absolute inset-0 bg-oliva/10 blur-3xl opacity-50"></div>
      
      <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest relative z-10 mb-2">Paso final</p>
      <h2 class="text-white text-3xl font-black uppercase italic relative z-10">Tu Perfil</h2>
      <p class="text-stone-300 text-sm font-bold relative z-10 mt-2">Completa estos datos para mejorar tu experiencia en el box.</p>
    </div>

    <!-- Form -->
    <form [formGroup]="form" (ngSubmit)="submit()" class="px-8 py-8 space-y-6">

      <div class="grid grid-cols-2 gap-4">
        <!-- Sexo -->
        <div>
          <label class="section-label block mb-2 text-stone-900">Sexo</label>
          <select formControlName="sexo" class="input-base text-center bg-stone-50 font-bold w-full uppercase text-sm">
            <option value="" disabled selected>Selecciona</option>
            <option value="masculino">Masculino</option>
            <option value="femenino">Femenino</option>
            <option value="otro">Otro</option>
          </select>
        </div>

        <!-- Edad -->
        <div>
          <label class="section-label block mb-2 text-stone-900">Edad</label>
          <input
            formControlName="edad"
            type="number"
            placeholder="Ej: 28"
            class="input-base text-center bg-stone-50 font-black text-lg w-full"
          />
        </div>
      </div>

      <!-- Teléfono -->
      <div>
        <label class="section-label block mb-2 text-stone-900">Teléfono móvil</label>
        <input
          formControlName="telefono"
          type="tel"
          placeholder="Tu número..."
          class="input-base text-center bg-stone-50 font-bold tracking-widest w-full"
        />
      </div>

      <!-- Divider -->
      <div class="h-px bg-stone-200 my-4"></div>
      <p class="section-label text-stone-500 mb-4 px-1">Términos y Consentimientos</p>

      <!-- Checks -->
      <div class="space-y-4">
        
        <label class="flex items-start gap-4 cursor-pointer group">
          <div class="relative flex items-center justify-center pt-0.5">
            <input type="checkbox" formControlName="consentimientoDatos" class="peer sr-only">
            <div class="w-6 h-6 border-2 border-stone-300 rounded-lg group-hover:border-oliva peer-checked:bg-oliva peer-checked:border-oliva transition-all flex items-center justify-center">
              <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>
          <div class="flex-1">
            <p class="text-[12px] font-bold text-stone-800 leading-tight">Autorizo la cesión de datos a apps de terceros</p>
            <p class="text-[10px] text-stone-400 font-bold mt-1">Para integración de métricas (Wodify, etc).</p>
          </div>
        </label>

        <label class="flex items-start gap-4 cursor-pointer group">
          <div class="relative flex items-center justify-center pt-0.5">
            <input type="checkbox" formControlName="consentimientoFotos" class="peer sr-only">
            <div class="w-6 h-6 border-2 border-stone-300 rounded-lg group-hover:border-oliva peer-checked:bg-oliva peer-checked:border-oliva transition-all flex items-center justify-center">
              <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>
          <div class="flex-1">
            <p class="text-[12px] font-bold text-stone-800 leading-tight">Autorizo publicación en rrss</p>
            <p class="text-[10px] text-stone-400 font-bold mt-1">Permito que mis fotos aparezcan en nuestro Instagram oficial.</p>
          </div>
        </label>

        <label class="flex items-start gap-4 cursor-pointer group">
          <div class="relative flex items-center justify-center pt-0.5">
            <input type="checkbox" formControlName="consentimientoRiesgos" class="peer sr-only">
            <div class="w-6 h-6 border-2 border-stone-300 rounded-lg group-hover:border-oliva peer-checked:bg-oliva peer-checked:border-oliva transition-all flex items-center justify-center">
              <svg class="w-4 h-4 text-white opacity-0 peer-checked:opacity-100 transition-opacity" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
            </div>
          </div>
          <div class="flex-1">
            <p class="text-[12px] font-bold text-stone-800 leading-tight">Asumo riesgos deportivos (Requerido)*</p>
            <p class="text-[10px] text-stone-400 font-bold mt-1">Declaro ser apto y consciente de los riesgos de la actividad física.</p>
          </div>
        </label>

      </div>

      <!-- Error message API -->
      @if (error()) {
        <div class="bg-red-50 border border-red-200 text-red-700 text-xs font-bold px-4 py-3 rounded-2xl text-center">
          {{ error() }}
        </div>
      }

      <div class="pt-4 flex flex-col gap-3">
        <!-- Main Button -->
        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="w-full bg-oliva text-white font-black text-sm uppercase tracking-widest
                 py-4 rounded-3xl shadow-lg
                 hover:bg-oliva-dark active:scale-95
                 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-all duration-200"
        >
          @if (loading()) {
            <span class="inline-flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/></svg>
              Guardando...
            </span>
          } @else {
            Guardar y Entrar
          }
        </button>
        
        <!-- Omitir Button -->
        <button
          type="button"
          (click)="omitir()"
          [disabled]="loading()"
          class="w-full bg-transparent text-stone-400 font-bold text-xs uppercase tracking-widest
                 py-3 rounded-3xl hover:text-stone-800 active:scale-95
                 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-all duration-200"
        >
          Omitir por ahora
        </button>
      </div>

    </form>
  </div>
</div>
