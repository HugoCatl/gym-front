<div class="min-h-screen bg-stone-100 flex items-center justify-center p-4">
  <div class="w-full max-w-md">

    <!-- Logo / Header -->
    <div class="text-center mb-10">
      <h1 class="text-4xl font-black tracking-tighter italic uppercase text-stone-900">
        MOVIMENT <span class="text-oliva">VIVER</span>
      </h1>
      <p class="text-stone-400 text-xs font-bold tracking-widest uppercase mt-2">
        Gestión de clases
      </p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-5xl shadow-2xl border border-stone-200 overflow-hidden">

      <!-- Card Header -->
      <div class="bg-stone-900 px-8 py-6">
        <p class="text-stone-400 text-[10px] font-black uppercase tracking-widest">Acceso</p>
        <h2 class="text-white text-xl font-black uppercase italic">Identifícate</h2>
      </div>

      <!-- Form -->
      <form [formGroup]="form" (ngSubmit)="submit()" class="px-8 py-8 space-y-5">

        <!-- DNI -->
        <div>
          <label class="section-label block mb-2">DNI</label>
          <input
            formControlName="dni"
            type="text"
            placeholder="12345678A"
            autocomplete="username"
            class="input-base uppercase font-black text-lg tracking-widest text-center"
          />
        </div>

        <!-- Contraseña -->
        <div>
          <label class="section-label block mb-2">Contraseña</label>
          <input
            formControlName="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            class="input-base text-center"
          />
        </div>

        <!-- Error -->
        @if (auth.error()) {
          <div class="bg-red-50 border border-red-200 text-red-700 text-xs font-bold px-4 py-3 rounded-2xl text-center">
            {{ auth.error() }}
          </div>
        }

        <!-- Botón principal -->
        <button
          type="submit"
          [disabled]="form.invalid || auth.loading()"
          class="w-full bg-oliva text-white font-black text-sm uppercase tracking-widest
                 py-4 rounded-2xl shadow-lg
                 hover:bg-oliva-dark active:scale-95
                 disabled:opacity-40 disabled:cursor-not-allowed
                 transition-all duration-200"
        >
          @if (auth.loading()) {
            <span class="inline-flex items-center gap-2">
              <svg class="animate-spin h-4 w-4" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
              </svg>
              Entrando...
            </span>
          } @else {
            Entrar
          }
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-3 py-2">
          <div class="flex-1 h-px bg-stone-200"></div>
          <span class="text-stone-300 text-[10px] font-black uppercase tracking-widest">o</span>
          <div class="flex-1 h-px bg-stone-200"></div>
        </div>

        <!-- Enlace a registro -->
        <div class="text-center pt-2">
          <p class="text-xs font-bold text-stone-500">¿No tienes cuenta? 
            <a routerLink="/auth/register" class="text-oliva hover:underline cursor-pointer">Crea una cuenta nueva</a>
          </p>
        </div>

      </form>
    </div>

    <!-- Hint dev -->
    <p class="text-center text-stone-400 text-[10px] font-bold mt-6 uppercase tracking-widest">
      Demo → Coach: <span class="text-oliva">COACH00A</span> · Alumno: <span class="text-oliva">ALUMNO0B</span>
    </p>

  </div>
</div>
