<!-- Header móvil -->
<div class="lg:hidden bg-stone-900 text-white px-6 py-4 flex justify-between items-center sticky top-0 z-30">
  <h1 class="text-xl font-black tracking-tighter italic uppercase">
    MOVIMENT <span class="text-oliva">VIVER</span>
  </h1>
  <button (click)="toggleSidebar()" class="p-2 rounded-xl hover:bg-stone-800 transition-colors">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
    </svg>
  </button>
</div>

<div class="flex min-h-screen lg:min-h-0 lg:h-screen">

  <!-- Overlay móvil -->
  @if (sidebarOpen()) {
    <div
      class="fixed inset-0 bg-stone-900/50 z-40 lg:hidden"
      (click)="toggleSidebar()"
    ></div>
  }

  <!-- Sidebar -->
  <aside
    class="fixed lg:relative top-0 left-0 h-full lg:h-screen w-72 bg-stone-900 text-white z-50
           flex flex-col transition-transform duration-300 lg:translate-x-0"
    [class.-translate-x-full]="!sidebarOpen()"
    [class.translate-x-0]="sidebarOpen()"
  >
    <!-- Brand -->
    <div class="px-8 py-8 border-b border-stone-800">
      <h1 class="text-2xl font-black tracking-tighter italic uppercase">
        MOVIMENT <span class="text-oliva">VIVER</span>
      </h1>
      <p class="text-stone-500 text-[10px] font-bold tracking-widest uppercase mt-1">Panel Coach</p>
    </div>

    <!-- Nav links -->
    <nav class="flex-1 px-4 py-6 space-y-1">
      <a
        routerLink="dashboard"
        routerLinkActive="bg-oliva text-white"
        [routerLinkActiveOptions]="{ exact: true }"
        (click)="sidebarOpen.set(false)"
        class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm text-stone-400
               hover:text-white hover:bg-stone-800 transition-all duration-200 uppercase tracking-wide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M4 5a1 1 0 011-1h4a1 1 0 011 1v5a1 1 0 01-1 1H5a1 1 0 01-1-1V5zm10 0a1 1 0 011-1h4a1 1 0 011 1v2a1 1 0 01-1 1h-4a1 1 0 01-1-1V5zm0 8a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1h-4a1 1 0 01-1-1v-7zM4 13a1 1 0 011-1h4a1 1 0 011 1v7a1 1 0 01-1 1H5a1 1 0 01-1-1v-7z"/>
        </svg>
        Dashboard
      </a>

      <a
        routerLink="alumnos"
        routerLinkActive="bg-oliva text-white"
        (click)="sidebarOpen.set(false)"
        class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm text-stone-400
               hover:text-white hover:bg-stone-800 transition-all duration-200 uppercase tracking-wide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
        Alumnos
      </a>

      <a
        routerLink="historial"
        routerLinkActive="bg-oliva text-white"
        (click)="sidebarOpen.set(false)"
        class="flex items-center gap-3 px-4 py-3 rounded-2xl font-bold text-sm text-stone-400
               hover:text-white hover:bg-stone-800 transition-all duration-200 uppercase tracking-wide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
        </svg>
        Historial
      </a>
    </nav>

    <!-- User / Logout -->
    <div class="px-4 py-6 border-t border-stone-800">
      <div class="flex items-center gap-3 px-4 py-3 mb-2">
        <div class="w-9 h-9 bg-oliva rounded-full flex items-center justify-center font-black text-sm">
          {{ auth.usuario()?.nombre?.charAt(0) }}
        </div>
        <div>
          <p class="text-white text-sm font-bold truncate">{{ auth.usuario()?.nombre }}</p>
          <p class="text-stone-500 text-[10px] font-bold uppercase">Coach</p>
        </div>
      </div>
      <button
        (click)="logout()"
        class="w-full flex items-center gap-3 px-4 py-3 rounded-2xl text-stone-400
               hover:text-red-400 hover:bg-stone-800 transition-all duration-200 font-bold text-sm uppercase tracking-wide"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
        </svg>
        Cerrar sesión
      </button>
    </div>
  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto bg-stone-100 lg:h-screen">
    <router-outlet />
  </main>

</div>
